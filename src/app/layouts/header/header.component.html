<header class="header">
  <div class="container">
    <div class="header-content">
      <a routerLink="/" class="logo" aria-label="Masszázs Szalon">
        <span class="logo-icon">Masszázs Szalon</span>
      </a>

      <nav class="nav" role="navigation" aria-label="Fő navigáció">
        <ul class="nav-list">
          <li class="nav-item">
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">Főoldal</a>
          </li>
          <li class="nav-item" *ngIf="!isLoggedIn">
            <a routerLink="/login" routerLinkActive="active" class="nav-link">Bejelentkezés</a>
          </li>
          <li class="nav-item" *ngIf="!isLoggedIn">
            <a routerLink="/register" routerLinkActive="active" class="nav-link">Regisztráció</a>
          </li>
          <li class="nav-item" *ngIf="isLoggedIn">
            <a routerLink="/profile" routerLinkActive="active" class="nav-link">Profilom</a>
          </li>
          <li class="nav-item" *ngIf="isLoggedIn">
            <button type="button" class="nav-link btn-logout" (click)="logout()" aria-label="Kijelentkezés">
              Kijelentkezés
            </button>
          </li>
        </ul>
      </nav>

      <!-- Mobile menu button -->
      <button type="button" class="mobile-menu-toggle" aria-label="Menü megnyitása" aria-expanded="false">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
  </div>
</header>
